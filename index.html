<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Document</title>
		<link rel="stylesheet" href="style.css" />
	</head>
	<body>
		<div class="form-container">
			<h1>Оставить отзыв</h1>
			<form id="form" action="https://api.web3forms.com/submit" method="POST">
				<label for="name">Имя:</label>
				<input name="name" required placeholder="Ваше Имя" />

				<label for="text">Текст отзыва:</label>
				<textarea
					name="text"
					rows="5"
					required
					placeholder="Напишите ваш отзыв..."
				></textarea>

				<button type="submit" id="post">Отправить на почту</button>
				<button type="submit" id="tg">Отправить в ТГ</button>
			</form>
		</div>

		<script src="script.js"></script>
	</body>
</html>
