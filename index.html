<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Анонимное сообщение в группу</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="form-container">
        <h1>Оставить сообщение</h1>
        <form id="form">
            <label for="name">Имя(пишите любое, будет аноним ):</label>
            <input name="name" id="name" required placeholder="Ваше Имя">

            <label for="text">Текст сообщения:</label>
            <textarea name="text" id="text" rows="5" required placeholder="Напишите ваше послание..."></textarea>

            <button type="submit" id="tg">Отправить в группу:</button>
        </form>
    </div>

    <script src="script.js"></script>
    <script src="send-message.js"></script>
</body>
</html>
